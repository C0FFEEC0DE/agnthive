name: Hook Contracts

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  hook-contracts:
    name: Hook Contracts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 'lts/*'

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install test dependencies
        run: pip install pytest

      - name: Run Node hook fixture runner (cases + scenarios)
        run: node scripts/test-hooks.mjs

      - name: Run hook-related pytest checks
        run: python -m pytest tests/test_settings_hooks.py -v